name: Scheduled WA Notifications

on:
  schedule:
    # Laporan HT Harian - 16:00 WIB (09:00 UTC)
    - cron: '0 9 * * 1-5'
    # Summary Perkiraan H-1 - 07:00 WIB (00:00 UTC)
    - cron: '0 0 * * 1-5'
  workflow_dispatch:
    inputs:
      action:
        description: 'Notification type'
        required: true
        type: choice
        options:
          - scheduled-laporan-ht
          - scheduled-perkiraan-h1

jobs:
  laporan-ht:
    if: github.event.schedule == '0 9 * * 1-5' || github.event.inputs.action == 'scheduled-laporan-ht'
    runs-on: ubuntu-latest
    steps:
      - name: Send Laporan HT
        run: |
          curl -X POST https://jwsfsczgyqphoyflpjnm.supabase.co/functions/v1/notif-fonnte \
            -H "Content-Type: application/json" \
            -d '{"action":"scheduled-laporan-ht"}'

  perkiraan-h1:
    if: github.event.schedule == '0 0 * * 1-5' || github.event.inputs.action == 'scheduled-perkiraan-h1'
    runs-on: ubuntu-latest
    steps:
      - name: Send Perkiraan H-1
        run: |
          curl -X POST https://jwsfsczgyqphoyflpjnm.supabase.co/functions/v1/notif-fonnte \
            -H "Content-Type: application/json" \
            -d '{"action":"scheduled-perkiraan-h1"}'
